<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Diarizer — Transcript Review</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header id="player-bar">
    <button id="btn-back5" type="button">-5s</button>
    <button id="btn-playpause" type="button">Play</button>
    <button id="btn-fwd5" type="button">+5s</button>
    <span class="time"><span id="time-now">0:00</span> / <span id="time-total">0:00</span></span>
    <label>Vol <input id="vol" type="range" min="0" max="1" step="0.01" value="1"></label>
    <span class="spacer"></span>
    <button id="btn-save" type="button">Save</button>
    <button id="btn-diff" type="button">Diff</button>
    <select id="versions-dropdown"><option value="">(versions)</option></select>
    <audio id="audio" preload="metadata" src="/api/audio"></audio>
  </header>

  <section id="spectrogram-wrap">
    <canvas id="spectrogram" width="1200" height="120"></canvas>
  </section>

  <main id="transcript"></main>

  <div id="toast" class="hidden"></div>

  <dialog id="rename-modal">
    <form method="dialog">
      <h3>Rename speaker (global)</h3>
      <label>Speaker
        <select id="rename-from"></select>
      </label>
      <label>New label
        <input id="rename-to" type="text">
      </label>
      <menu>
        <button value="cancel">Cancel</button>
        <button id="rename-ok" value="ok">Rename</button>
      </menu>
    </form>
  </dialog>

  <dialog id="reassign-modal">
    <form method="dialog">
      <h3>Reassign segment speaker</h3>
      <label>Speaker
        <select id="reassign-to"></select>
      </label>
      <menu>
        <button value="cancel">Cancel</button>
        <button id="reassign-ok" value="ok">Apply</button>
      </menu>
    </form>
  </dialog>

  <script src="/static/app.js"></script>
</body>
</html>
