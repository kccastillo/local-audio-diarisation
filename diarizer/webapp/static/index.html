<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Diarizer — Transcript Review</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header id="player-bar">
    <button id="btn-back5" type="button">-5s</button>
    <button id="btn-playpause" type="button">Play</button>
    <button id="btn-fwd5" type="button">+5s</button>
    <span class="time"><span id="time-now">0:00</span> / <span id="time-total">0:00</span></span>
    <label>Vol <input id="vol" type="range" min="0" max="1" step="0.01" value="1"></label>
    <span class="spacer"></span>
    <button id="btn-zoom-out" type="button" title="Zoom out (or Ctrl+wheel)">Zoom -</button>
    <span id="zoom-readout" class="time">1×</span>
    <button id="btn-zoom-in" type="button" title="Zoom in (or Ctrl+wheel)">Zoom +</button>
    <button id="btn-export" type="button">Export TXT</button>
    <button id="btn-save" type="button">Save</button>
    <button id="btn-diff" type="button">Diff</button>
    <select id="versions-dropdown"><option value="">(versions)</option></select>
    <audio id="audio" preload="metadata" src="/api/audio"></audio>
  </header>

  <section id="waveform-wrap">
    <canvas id="waveform" width="1600" height="120"></canvas>
  </section>

  <main id="transcript"></main>

  <div id="toast" class="hidden"></div>

  <dialog id="speaker-modal">
    <form method="dialog">
      <h3>Speaker</h3>
      <label>Existing speakers
        <select id="speaker-existing"></select>
      </label>
      <label>Or type new label
        <input id="speaker-new" type="text" placeholder="e.g. Alice">
      </label>
      <label>
        <input id="speaker-replace-all" type="checkbox">
        <span id="speaker-replace-label">Replace all segments currently labelled "..."</span>
      </label>
      <menu>
        <button value="cancel">Cancel</button>
        <button id="speaker-ok" value="ok">Apply</button>
      </menu>
    </form>
  </dialog>

  <script src="/static/app.js"></script>
</body>
</html>
