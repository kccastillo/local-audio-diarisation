# Diarizer v2 configuration. Loaded by v2/config.py.
# Every section is optional; absent sections fall back to dataclass defaults.

paths:
  recordings_dir: recordings
  output_dir: output
  temp_dir: temp
  logs_dir: logs

model:
  name: large-v3-turbo
  compute_type: float16    # float16 | int8 | int8_float16
  device: cuda             # cuda | cpu
  cpu_fallback: true
  language: null           # null = auto-detect

diarisation:
  enabled: true
  min_speakers: null
  max_speakers: null

preprocessing:
  enabled: true
  normalise: true        # adaptive — only applies when input RMS < -32 dBFS
  denoise: false         # default OFF — denoising hurts Whisper WER on clean audio
  target_sample_rate: 16000

output:
  format: txt              # txt | json | srt
  include_timestamps: true
  include_speakers: true

auth:
  # Hugging Face token. Resolution order at runtime:
  #   1. CLI flag --auth-token
  #   2. this field (auth.hf_token)
  #   3. token_path file content (matches v1 convention)
  #   4. env HF_TOKEN
  #   5. env HUGGING_FACE_HUB_TOKEN
  hf_token: null
  token_path: null   # e.g. "D:/Projects/Tokens/kc_diariser.txt"
